<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro</title>
<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background-color: #eba03e;
}

#cadastro {
  max-width: 380px;
  margin: 60px auto;
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border: 1px solid #ffffff;
  border-radius: 25px;
  background-color: white;
}

img {
  width: 120px;
  margin: 0 auto;
}

h1 {
  text-align: center;
}

label {
  font-size: 14px;
  font-weight: 600;
}

input {
  height: 45px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #eba03e;
  font-size: 14px;
  border-color: #24232346;
  
}
input:hover{
    border-color: #eba03e;
}

button {
  height: 45px;
  margin-top: 20px;
  border: none;
  border-radius: 8px;
  background-color:#eba03e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
  
}

a{
    text-decoration: none;
    color: black;
    margin-left: 100px;
}



</style>




</head>
<body>
    <main>

      

        <form id = "cadastro">
        <!-------dados pessoas ---------->

       <img src="icone/ChatGPT Image 3 de nov. de 2025, 09_25_16.png">
           <h1>cadastro</h1>


            
            <input type="text" id="nome" name="nome" placeholder="digite seu nome completo" required>

           
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>

          
            <input type="number" id="cpf" name="cpf" placeholder="000.000.000-00" required>
              
           
             <input type="number" id="telefone" name="telefone" placeholder="(99) 99999-9999" required>

        
          
               <!---endereço-->
         
            <input type="number"  id="cep" name="cep"  placeholder="00000-000" required>

            <input type="text"  id="rua" placeholder="Rua" name="rua" required>
            
            <input type="text"  id="numero"  placeholder="Numero"   name="numero" required>
            
            <input type="text"  id="bairro" placeholder="Bairro" name="bairro" required>
               
            <!--senha-->

            <input type="password" id="senha" placeholder="digite sua senha">
             <input type="password" id="senha" placeholder="digite sua senha novamente">
          
          <button type="submit">Cadastrar</button>
             <a href="login.html">tenho conta</a>
        </form>
     
    </main>
</body>
</html>
