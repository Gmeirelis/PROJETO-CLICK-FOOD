<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../assets/css/pages/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/components/loanding.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Login</title>
  </head>
  <body>
    <main>
      <section class="form">
        <form class="formularios">
          <div class="texto">
            <img
              class="perfil"
              src="../assets/img/slides/freepik__upload__45.png"
            />
            <h1>Login</h1>
            <p>Faça seu login para entrar</p>
          </div>

          <div class="inputs">
            <input
              placeholder="seuemail@exemplo.com"
              type="email"
              class="email"
            />
            <input
              type="password"
              placeholder="Digite sua senha"
              class="password"
            />

            <p class="error"></p>

             <div class="btn-fechar">
            <button id="btnEntrar" type="submit">
              <span class="texto">Entrar</span>
              <span class="loader"></span>
            </button>
            </div>
          </div>

          <div class="dividir">
            <span>continuir com </span>
          </div>

          <div class="redes">
            <div>
              <button type="button" class="google-login">
                <img
                  class="google"
                  src="../assets/img/icons/google.png"
                  alt=""
                />
                Google
              </button>
            </div>
            <div>
              <button type="button" class="google-login">
                <img
                  class="google"
                  src="../assets/img/icons/apple.png"
                  alt=""
                />
                Apple
              </button>
            </div>
          </div>

          <div class="cadastro">
            <a href="cadastro.html">Não tenho conta</a>
            <a href="#">Esqueci minha senha</a>
          </div>
        </form>
      </section>

    

      <section class="banner">

  <article class="container">
        <h1>Descubra restaurantes incríveis perto de você</h1>
        <img src="../assets/img/icons/motoboy.png" class="motoboy">
      </article>


      </section>
    </main>
    <script src="../assets/js/auth/login.js"></script>
   
  </body>
</html>
