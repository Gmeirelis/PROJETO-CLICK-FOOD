<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../assets/css/pages/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/components/loanding.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Login</title>
  </head>
  <body>
    <main>
      <section>
        <form class="formularios">
          <div class="login">
            <div class="entrar">
              <h1>Login</h1>

              <input
                placeholder="Digite o seu email"
                type="email"
                class="email"
              />
              <input
                type="password"
                placeholder="Digite sua senha"
                class="password"
              />
              <p class="error"></p>
              <button class="google-login">
                <i class="fa-brands fa-google"></i>
                Entrar com Google
              </button>

                 <button id="btnEntrar">
                <span class="texto">Entrar</span>
                <span class="loader"></span>

              <div class="cadastro">
                <a href="cadastro.html">Não tenho conta</a>
                <a href="#">Esqueci minha senha</a>
              </div>

           
                
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="../assets/js/auth/authService.js"></script>
    <script  type="module" src="../assets/js/auth/login.js"></script>
    <script type="module" src="../assets/js/loading.js"></script>
   

  </body>
</html>
