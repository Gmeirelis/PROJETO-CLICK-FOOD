<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="/assets/css/pages/cadastro.css" />
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
      
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>cadastro</title>

</head>
<body>
    <main>

      
       <div class="container">
  <form id="cadastro" >

   

    <h1>CADASTRA-SE</h1>

    <div class="cadastro-layout">

      <!-- coluna 1 -->
      <div class="cad">
        <label>Nome</label>
       <input type="text" id="nome" name="nome" placeholder=" digite seu nome " required>
       
        <label>Sobrenome</label>
       <input type="text" id="sobrenome" name="sobrenome" placeholder="digite seu sobrenome" required>

        <label>Email</label>
        <input type="email" id="email" name="email" placeholder="✉ exemplo@email.com" required>
        <span class="error-email"></span>
        
      </div>

      <!-- coluna 2 -->
      <div class="cad">
       
        <label>CEP</label>
        <input type="text" id="cep" name="cep" placeholder="00000-000" required>

        <label>Rua</label>
       <input type="text" id="rua" placeholder="Rua" name="rua">

        <label>Número</label>
        <input type="text" id="numero" placeholder="Numero" name="numero" required >

        <label>Bairro</label>
       <input type="text" id="bairro" placeholder="Bairro" name="bairro" required>
      </div>

      <!-- coluna 3 -->
      <div class="cad">
        <label >Senha</label>
        <input type="password" placeholder="⚠ A senha deve ter 6 caracteres" id="senha" name="senha" required >
         
         
        <label>Confirmar senha</label>
        <input type="password" placeholder="Digite novamente" id="senha2" name="senha2"  required>
        <div class="error-senha">
        
        </div>
       <div class="verificacao">
  <p><i class="fa-solid fa-xmark erro" id="senhaTamanho"></i> A senha deve conter pelo menos 6 caracteres</p>
  <p><i class="fa-solid fa-xmark erro" id="senhaIgual"></i> As senhas devem ser iguais</p>
  <p><i class="fa-solid fa-xmark erro" id="preenchido"></i> Preencha todos os campos obrigatórios</p>
</div>
      </div>
        
      
    </div>

    <button  id="btnEntrar" type="submit">
                <span class="texto">cadastrar</span>
                <span class="loader"></span>
              </button>
    <a href="login.html">Já tenho conta</a>

  </form>
</div>
    </main>
    <script type="module" src="/assets/js/usuarios/usuarioService.js"></script>
    <script type="module" src="/assets/js/validacao/cadastro.js"></script>




    
</body>
</html>
